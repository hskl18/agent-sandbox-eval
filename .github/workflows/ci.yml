name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest -q

      - name: Run type checks
        run: python -m mypy agent_sandbox_eval

      - name: Validate bundled tasks
        run: |
          ase validate-tasks --benchmark all
          ase lint-tasks --benchmark all

      - name: Run Docker harness baselines
        run: |
          mkdir -p artifacts/v1
          ase run --agent scripted --benchmark all --out artifacts/v1/scripted-oracle.jsonl
          ase run --agent react --provider local-solution --benchmark all --out artifacts/v1/react-local-solution.jsonl
          ase run --agent noop --benchmark all --out artifacts/v1/noop-negative-control.jsonl
          ase report artifacts/v1/scripted-oracle.jsonl --out artifacts/v1/scripted-oracle.md
          ase report artifacts/v1/react-local-solution.jsonl --out artifacts/v1/react-local-solution.md
          ase report artifacts/v1/noop-negative-control.jsonl --out artifacts/v1/noop-negative-control.md
          ase compare artifacts/v1/scripted-oracle.jsonl artifacts/v1/react-local-solution.jsonl artifacts/v1/noop-negative-control.jsonl --out artifacts/v1/comparison.md
          python tools/build_harness_manifest.py \
            --scripted artifacts/v1/scripted-oracle.jsonl \
            --react-local-solution artifacts/v1/react-local-solution.jsonl \
            --noop artifacts/v1/noop-negative-control.jsonl \
            --out artifacts/v1/manifest.json

      - name: Run repeated local-control matrix
        run: |
          ase run-matrix examples/experiments/local-controls.yaml
          sha256sum runs/v0.2-local-controls/summary.json runs/v0.2-local-controls/report.md > /tmp/matrix-first.sha256
          ase run-matrix examples/experiments/local-controls.yaml
          sha256sum runs/v0.2-local-controls/summary.json runs/v0.2-local-controls/report.md > /tmp/matrix-second.sha256
          diff -u /tmp/matrix-first.sha256 /tmp/matrix-second.sha256
          ase matrix-report examples/experiments/local-controls.yaml
          sha256sum runs/v0.2-local-controls/summary.json runs/v0.2-local-controls/report.md > /tmp/matrix-regenerated.sha256
          diff -u /tmp/matrix-second.sha256 /tmp/matrix-regenerated.sha256

      - name: Upload harness baseline artifact
        uses: actions/upload-artifact@v6
        with:
          name: harness-baseline-v1
          path: artifacts/v1
          if-no-files-found: error

      - name: Upload matrix control artifact
        uses: actions/upload-artifact@v6
        with:
          name: matrix-controls-v0.2
          path: runs/v0.2-local-controls
          if-no-files-found: error
