schema_version: 1
id: fix-date-format-001
benchmark: swe_lite
title: Fix date formatting
instruction: Fix formatter.format_date so it returns YYYY-MM-DD.
workspace: workspace
setup: []
allowed_tools: [shell, file_read, file_write]
success:
  type: command
  command: "python -m unittest -q"
  expected_exit_code: 0
limits:
  timeout_seconds: 45
  max_tool_calls: 10
  memory_mb: 256
  network: false
tags: [python, tests, bugfix]
solution:
  commands:
    - python -c "from pathlib import Path; p=Path('formatter.py'); p.write_text(p.read_text().replace('%m/%d/%Y', '%Y-%m-%d'))"
