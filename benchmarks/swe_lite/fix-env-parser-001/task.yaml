schema_version: 1
id: fix-env-parser-001
benchmark: swe_lite
title: Fix environment line parser
instruction: Fix env_parser.parse_env so it ignores comments and blank lines.
workspace: workspace
setup: []
allowed_tools: [shell, file_read, file_write]
success:
  type: command
  command: "python -m unittest -q"
  expected_exit_code: 0
limits:
  timeout_seconds: 45
  max_tool_calls: 10
  memory_mb: 256
  network: false
tags: [python, parsing, tests]
solution:
  commands:
    - |
      cat > env_parser.py <<'PY'
      def parse_env(lines):
          result = {}
          for line in lines:
              line = line.strip()
              if not line or line.startswith("#"):
                  continue
              key, value = line.split("=", 1)
              result[key.strip()] = value.strip()
          return result
      PY

