schema_version: 1
id: fix-python-function-001
benchmark: swe_lite
title: Fix a Python function bug
instruction: Fix calculator.add so the bundled unittest suite passes.
workspace: workspace
setup: []
allowed_tools: [shell, file_read, file_write]
success:
  type: command
  command: python -m unittest -q
  expected_exit_code: 0
limits:
  timeout_seconds: 45
  max_tool_calls: 10
  memory_mb: 256
  network: false
tags: [python, tests, bugfix]
solution:
  commands:
    - sed -i 's/return a - b/return a + b/' calculator.py

